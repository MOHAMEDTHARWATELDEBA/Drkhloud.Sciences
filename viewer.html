<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة المحاضرة التعليمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#1e293b; color:#f8fafc; text-align:center; padding:20px; }
        .viewer-container { max-width:900px; margin:0 auto; }
        
        /* مشغل الفيديو السينمائي */
        .video-wrapper { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.3); background:#000; margin-bottom:20px; }
        .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
        
        .action-row { display:flex; justify-content:space-between; align-items:center; background:#334155; padding:15px 25px; border-radius:8px; margin-top:15px; text-align:right; }
        .btn-download { background:#00a896; color:#fff; text-decoration:none; padding:10px 20px; border-radius:6px; font-weight:bold; display:inline-flex; align-items:center; gap:8px; transition:0.2s; }
        .btn-download:hover { background:#028074; }
        .btn-back { background:#475569; color:#fff; padding:10px 15px; border-radius:6px; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>

    <div class="viewer-container">
        <div class="video-wrapper">
            <iframe id="lecture-video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="action-row">
            <div>
                <h3 style="margin-bottom:4px;">🎥 أنت تتابع الآن الشرح الرسمي للدرس</h3>
                <p style="color:#cbd5e1; font-size:13px;">تأكد من تدوين الملاحظات وتحميل الواجب المرفق أدناه.</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="#" id="lecture-pdf-download-btn" target="_blank" class="btn-download"><i class="fas fa-file-pdf"></i> تحميل المذكرة والواجب</a>
                <a href="courses.html" class="btn-back">العودة للمناهج</a>
            </div>
        </div>
    </div>

    <script>
        // قراءة الروابط الممررة للدرس
        function setupLectureViewer() {
            const urlParams = new URLSearchParams(window.location.search);
            let videoUrl = urlParams.get('video') || "";
            let pdfUrl = urlParams.get('pdf') || "";

            // معالجة روابط يوتيوب العادية لتحويلها برمجياً إلى صيغة الـ Embed الصالحة للتشغيل داخل iframe
            if(videoUrl.includes("watch?v=")) {
                videoUrl = videoUrl.replace("watch?v=", "embed/");
            } else if(videoUrl.includes("youtu.be/")) {
                videoUrl = videoUrl.replace("youtu.be/", "youtube.com/embed/");
            }

            document.getElementById('lecture-video-iframe').src = videoUrl;

            const pdfBtn = document.getElementById('lecture-pdf-download-btn');
            if (pdfUrl && pdfUrl.trim() !== "" && pdfUrl !== "undefined") {
                pdfBtn.href = pdfUrl;
                pdfBtn.style.display = "inline-flex";
            } else {
                // إخفاء الزر لو الإدمن لم يرفع ملف PDF لهذا الدرس
                pdfBtn.style.display = "none";
            }
        }

        document.addEventListener('DOMContentLoaded', setupLectureViewer);
    </script>
</body>
</html>
