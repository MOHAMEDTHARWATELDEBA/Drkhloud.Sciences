<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة متابعة ولي الأمر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 40px; text-align: right; }
        .parent-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .section-title { color: #2c3e50; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; font-size: 22px; }
        
        /* تنسيق جدول النتائج المطور */
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .results-table th, .results-table td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        .results-table th { background-color: #2c3e50; color: white; font-weight: 600; }
        .results-table tr:hover { background-color: #f8fafc; }
        
        .score-badge { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .score-good { background: #d1fae5; color: #065f46; }
        .score-bad { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="parent-container">
        <h1 class="section-title"><i class="fas fa-graduation-cap" style="color:#00a896;"></i> تقرير الأداء الدراسي والامتحانات للابن</h1>
        
        <p style="color:#64748b; margin-bottom: 20px;">هنا يمكنك متابعة نتائج الامتحانات الإلكترونية التي قام ابنك بحلها فور تصحيحها تلقائياً من النظام.</p>

        <!-- جدول استعراض نتائج الامتحانات التلقائي -->
        <table class="results-table">
            <thead>
                <tr>
                    <th>اسم الامتحان</th>
                    <th>اسم الطالب</th>
                    <th>تاريخ خوض الاختبار</th>
                    <th>النتيجة المحققة</th>
                </tr>
            </thead>
            <tbody id="parent-results-tbody">
                <!-- سيتم ملء البيانات هنا تلقائياً بواسطة الـ JS -->
            </tbody>
        </table>
    </div>

    <script>
        function loadStudentResultsForParent() {
            const results = JSON.parse(localStorage.getItem('exam_results')) || [];
            const tbody = document.getElementById('parent-results-tbody');
            tbody.innerHTML = "";

            if (results.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8; padding:20px;">لم يقم الطالب بخوض أي امتحانات حتى الآن.</td></tr>`;
                return;
            }

            // ترتيب النتائج من الأحدث للأقدم
            results.reverse().forEach(res => {
                // تحديد لون بطاقة النتيجة بناءً على مستوى نجاح الطالب (مثلاً لو جاب أكتر من نصف الدرجة)
                let passLimit = res.total / 2;
                let badgeClass = res.score >= passLimit ? 'score-good' : 'score-bad';

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${res.examTitle}</strong></td>
                        <td>${res.studentName}</td>
                        <td><i class="far fa-calendar-alt"></i> ${res.date}</td>
                        <td>
                            <span class="score-badge ${badgeClass}">
                                ${res.score} من ${res.total}
                            </span>
                        </td>
                    </tr>
                `;
            });
        }

        // تشغيل الدالة فور تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadStudentResultsForParent);
    </script>
</body>
</html>
